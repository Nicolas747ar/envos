<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f1419" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="EnVos" />
<title>EnVos</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

</head>
<body>
<header>

<main id="app"><!-- render dinámico --></main>

<div id="modal-root"></div>

<nav>

  <button data-tab="patrones"><span class="ico">🔍</span>Patrones</button>

  <button data-tab="experimentos"><span class="ico">🧪</span>Experim.</button>
  <button data-tab="precision"><span class="ico">🎯</span>Precisión</button>
</nav>

<script src="js/store.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>

</html>
